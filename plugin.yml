package com.anticheat.checks;

import com.anticheat.AntiCheatPlugin;
import com.anticheat.managers.PlayerDataManager;
import org.bukkit.entity.Entity;
import org.bukkit.entity.Player;
import org.bukkit.event.entity.EntityDamageByEntityEvent;

public class KillAuraCheck {

    private final AntiCheatPlugin plugin;
    private final PlayerDataManager dataManager;

    public KillAuraCheck(AntiCheatPlugin plugin, PlayerDataManager dataManager) {
        this.plugin = plugin;
        this.dataManager = dataManager;
    }

    public boolean check(Player attacker, EntityDamageByEntityEvent event) {
        if (!plugin.getConfig().getBoolean("checks.killaura.enabled", true)) return false;
        if (attacker.hasPermission("anticheat.bypass")) return false;

        Entity target = event.getEntity();

        // Check if player is facing the target
        double angle = getAngleBetween(attacker, target);
        if (angle > 90) {
            // Hitting entity behind them = KillAura
            return true;
        }

        // Check CPS (clicks per second) - too fast = aura
        long now = System.currentTimeMillis();
        long last = dataManager.getLastAttackTime(attacker.getUniqueId());
        long diff = now - last;

        dataManager.setLastAttackTime(attacker.getUniqueId(), now);

        // Less than 50ms between hits = impossible CPS (>20 CPS)
        if (diff < 50 && last != 0) {
            return true;
        }

        return false;
    }

    private double getAngleBetween(Player player, Entity target) {
        // Direction player is looking
        double yaw = Math.toRadians(player.getLocation().getYaw());
        double lookX = -Math.sin(yaw);
        double lookZ = Math.cos(yaw);

        // Direction to target
        double dx = target.getLocation().getX() - player.getLocation().getX();
        double dz = target.getLocation().getZ() - player.getLocation().getZ();
        double dist = Math.sqrt(dx * dx + dz * dz);
        if (dist == 0) return 0;
        dx /= dist;
        dz /= dist;

        double dot = lookX * dx + lookZ * dz;
        dot = Math.max(-1, Math.min(1, dot));
        return Math.toDegrees(Math.acos(dot));
    }
}
