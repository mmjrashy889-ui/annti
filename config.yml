package com.anticheat;

import com.anticheat.listeners.AntiCheatCommand;
import com.anticheat.listeners.AntiCheatListener;
import com.anticheat.managers.AlertManager;
import com.anticheat.managers.PlayerDataManager;
import org.bukkit.plugin.java.JavaPlugin;

public class AntiCheatPlugin extends JavaPlugin {

    private PlayerDataManager dataManager;
    private AlertManager alertManager;

    @Override
    public void onEnable() {
        saveDefaultConfig();

        dataManager  = new PlayerDataManager();
        alertManager = new AlertManager(this);

        // Register listener
        getServer().getPluginManager().registerEvents(
                new AntiCheatListener(this, dataManager, alertManager), this);

        // Register commands
        AntiCheatCommand cmd = new AntiCheatCommand(this);
        getCommand("anticheat").setExecutor(cmd);
        getCommand("anticheaop").setExecutor((sender, command, label, args) -> {
            if (!sender.hasPermission("anticheat.reload")) {
                sender.sendMessage("§cNo permission!");
                return true;
            }
            reloadConfig();
            sender.sendMessage("§a[AntiCheat] Config reloaded!");
            return true;
        });

        getLogger().info("╔═══════════════════════════╗");
        getLogger().info("║   AntiCheat v1.0 Enabled  ║");
        getLogger().info("║  Fly | Reach | KillAura   ║");
        getLogger().info("║  AimAssist | NoFall       ║");
        getLogger().info("╚═══════════════════════════╝");
    }

    @Override
    public void onDisable() {
        getLogger().info("[AntiCheat] Plugin disabled.");
    }

    public PlayerDataManager getDataManager() { return dataManager; }
    public AlertManager getAlertManager()     { return alertManager; }
}
