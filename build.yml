name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      - run: mvn clean package
      - uses: actions/upload-artifact@v3
        with:
          name: AntiCheatPlugin
          path: target/*.jar
